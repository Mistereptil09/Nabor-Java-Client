name: CD - Build & Publish Release

on:
  push:
    tags:
      - 'v*' # Trigger on version tags (e.g., v1.0.0, v1.2.5)

permissions:
  contents: write # Required to create releases and upload assets

jobs:
  release:
    name: Build & Create Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch full history so we can verify branch ancestry

      - name: Verify tag is on master branch
        run: |
          if ! git branch -r --contains "${{ github.ref }}" | grep -q 'origin/master'; then
            echo "::error::Tag ${{ github.ref_name }} is not on the master branch. Releases must be tagged from master."
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is on master — proceeding with release."

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and Bundle Application
        run: |
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Building version: $VERSION"
          ./gradlew :app-desktop:bundle "-Pversion=$VERSION" --no-daemon

      - name: Package Application as ZIP
        run: |
          cd build/bundle
          rm -f nabor.db
          zip -r ../../nabor-desktop.zip *

      - name: Calculate Hash and Generate latest.json
        id: metadata
        run: |
          # 1. Extract clean version string (remove 'v' prefix from tag)
          TAG_NAME="${{ github.ref_name }}"
          VERSION="${TAG_NAME#v}"
          echo "Version: $VERSION"
          
          # 2. Path to the compiled ZIP
          ZIP_PATH="nabor-desktop.zip"
          
          # 3. Calculate SHA-256 checksum
          SHA256_HASH=$(sha256sum "$ZIP_PATH" | awk '{print $1}')
          echo "SHA-256: $SHA256_HASH"
          
          # 4. Construct JSON file
          cat <<EOF > latest.json
          {
            "version": "$VERSION",
            "sha256": "$SHA256_HASH",
            "changelog_url": "https://github.com/${{ github.repository }}/releases/tag/$TAG_NAME",
            "download_url": "https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/nabor-desktop.zip"
          }
          EOF
          
          cat latest.json

      - name: Package Plugins as ZIP
        run: |
          cd build/bundle/plugins
          zip -r ../../../plugins.zip *

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Nabor Services Client Release ${{ github.ref_name }}
            
            This release contains the complete application package (including plugins), individual executables, and update metadata.
            
            ### Assets Info:
            - **nabor-desktop.zip**: Complete package with executable and plugins (recommended for new installations and used by auto-updater).
            - **nabor-desktop.jar**: Standalone desktop executable fat JAR.
            - **plugins.zip**: Archive containing all core plugins.
            - **latest.json**: Release metadata for the auto-updater.
            
            Find the changelog and release details below.
          files: |
            nabor-desktop.zip
            build/bundle/nabor-desktop.jar
            latest.json
            plugins.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
